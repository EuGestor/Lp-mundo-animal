<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mundo Animal Pet Shop Itabira — Ração, Banho & Tosa com Frete Grátis</title>
    <meta name="description" content="Pet Shop e Clínica Veterinária em Itabira. Ração premium, banho & tosa com busca em casa, vacinas. Frete grátis em toda cidade. 4,5★ no Google." />
    <meta name="theme-color" content="#1B8A2D" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mundo Animal Pet Shop Itabira — Frete Grátis" />
    <meta property="og:description" content="Ração premium e Banho & Tosa com busca em casa. Frete grátis em toda Itabira." />
    <meta property="og:image" content="/assets/og-image.jpg" />
    <meta property="og:locale" content="pt_BR" />

    <!-- JSON-LD LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "PetStore",
      "name": "Mundo Animal Pet Shop",
      "image": "/assets/og-image.jpg",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Av. João Pinheiro, 194",
        "addressLocality": "Itabira",
        "addressRegion": "MG",
        "addressCountry": "BR"
      },
      "telephone": "+55-31-3831-1702",
      "openingHours": "Mo-Fr 08:00-18:00, Sa 08:00-13:00",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.5",
        "reviewCount": "48"
      },
      "sameAs": ["https://instagram.com/mundoanimalitabira"]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
